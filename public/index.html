<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>&#9745; Todo Manager</h1>
    </header>

    <form id="todo-form">
      <input type="text" id="todo-title" placeholder="What needs to be done?" required>
      <textarea id="todo-description" placeholder="Description (optional)" rows="2"></textarea>
      <div class="form-row">
        <select id="todo-priority">
          <option value="low">Low Priority</option>
          <option value="medium" selected>Medium Priority</option>
          <option value="high">High Priority</option>
        </select>
        <input type="date" id="todo-due-date">
        <button type="submit" id="form-submit-btn">Add Todo</button>
      </div>
    </form>

    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Search todos...">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
    </div>

    <div id="todo-list"></div>

    <footer id="todo-footer"></footer>
  </div>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h2>Edit Todo</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <input type="text" id="edit-title" placeholder="Title" required>
        <textarea id="edit-description" placeholder="Description (optional)" rows="2"></textarea>
        <div class="form-row">
          <select id="edit-priority">
            <option value="low">Low Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="high">High Priority</option>
          </select>
          <input type="date" id="edit-due-date">
        </div>
        <div class="modal-actions">
          <button type="button" id="edit-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
